services:
  - type: web
    name: learning-city-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.mjs
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      # r22 spend guardrails — all optional; these are the safe defaults.
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: MAX_CALLS_PER_DAY
        value: "60"
      - key: MAX_CALLS_PER_MONTH
        value: "600"
      - key: MAX_SPEND_USD_MONTH
        value: "15"
      - key: MAX_CALLS_PER_DEVICE_HR
        value: "6"
      - key: MAX_TOKENS_PER_CALL
        value: "1500"
      # set AI_DISABLED=1 in the Render dashboard to kill-switch AI instantly

    # ── r28: MAKE PILOT DATA PERMANENT ─────────────────────────────────────
    # The server stores all pilot data (telemetry, consents, budget counters)
    # under /var/data automatically WHEN a persistent disk is mounted there.
    # On the free plan the filesystem is wiped on every deploy/restart, so:
    #   1. Upgrade this service to Starter (Render dashboard → Settings)
    #   2. Uncomment the 3 lines below and push, or add the disk by hand
    #      (Settings → Disks → Add Disk, mount path /var/data, 1 GB)
    # 1 GB (≈ $0.25/mo) holds years of pilot telemetry.
    # disk:
    #   name: pilot-data
    #   mountPath: /var/data
    #   sizeGB: 1
